<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Runner</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#07061a; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:monospace; }
  h1 { color:#9966ff; font-size:14px; letter-spacing:.2em; text-transform:uppercase; margin-bottom:12px; opacity:.7; }
  #gc { display:block; background:#0a0a0f; border-radius:8px 8px 0 0; cursor:none; outline:none; }
  #ui { font-family:monospace; color:#e0d8ff; font-size:13px; display:flex; justify-content:space-between; padding:6px 12px; background:#0d0d14; border-radius:0 0 8px 8px; border-top:1px solid #1e1e30; width:680px; }
  #msg { color:#444; font-size:11px; margin-top:10px; letter-spacing:.05em; }
</style>
</head>
<body>
<h1>Shadow Runner</h1>
<canvas id="gc" width="680" height="320" tabindex="0"></canvas>
<div id="ui">
  <span>❖ SCORE <span id="sc">0</span></span>
  <span id="lvl">LEVEL 1</span>
  <span>LIVES <span id="lv">3</span></span>
</div>
<div id="msg">← → to move &nbsp;·&nbsp; ↑ or Space to jump &nbsp;·&nbsp; collect all orbs to advance</div>

<script>
const c = document.getElementById('gc'), ctx = c.getContext('2d');
const W = 680, H = 320;
let score = 0, lives = 3, level = 1, gameOver = false, won = false;
const GRAV = 0.55, JUMP = -12.5, SPEED = 4;
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
c.focus();

function makePlatforms(lvl) {
  const base = [
    {x:0,   y:290, w:160, h:12},
    {x:200, y:250, w:120, h:12},
    {x:370, y:210, w:100, h:12},
    {x:510, y:260, w:120, h:12},
    {x:630, y:220, w:140, h:12},
    {x:820, y:280, w:100, h:12},
    {x:970, y:230, w:120, h:12},
    {x:1140,y:200, w:100, h:12},
    {x:1300,y:250, w:150, h:12},
  ];
  if (lvl >= 2) {
    base.push(
      {x:1500,y:210,w:90, h:12},
      {x:1650,y:170,w:100,h:12},
      {x:1800,y:220,w:120,h:12},
      {x:1980,y:190,w:90, h:12}
    );
  }
  return base;
}

function makeOrbs(plats) {
  return plats.slice(1).map(p => ({ x: p.x + p.w / 2, y: p.y - 22, r: 7, col: true }));
}

const WORLD = 2200;
let platforms, orbs, cam = {x:0}, particles = [];
let spawnX = 60, spawnY = 220;
let p;

function init() {
  platforms = makePlatforms(level);
  orbs = makeOrbs(platforms);
  p = {x:spawnX, y:spawnY, w:20, h:28, vx:0, vy:0, onGround:false, dir:1, anim:0};
  cam = {x:0};
  particles = [];
  gameOver = false;
  won = false;
}
init();

function spawnParticle(x, y, col) {
  for (let i = 0; i < 8; i++)
    particles.push({x, y, vx:(Math.random()-.5)*3.5, vy:-Math.random()*3-1, life:1, col: col||'#a888ff'});
}

function update() {
  if (gameOver || won) return;
  p.anim += 0.15;

  if (keys['ArrowLeft']  || keys['KeyA']) { p.vx = -SPEED; p.dir = -1; }
  else if (keys['ArrowRight'] || keys['KeyD']) { p.vx = SPEED;  p.dir =  1; }
  else p.vx *= 0.82;

  if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && p.onGround) {
    p.vy = JUMP; p.onGround = false;
    spawnParticle(p.x + p.w/2, p.y + p.h, '#5533aa');
  }

  p.vy += GRAV;
  p.x  += p.vx;
  p.y  += p.vy;
  p.onGround = false;

  for (let pl of platforms) {
    if (p.x+p.w > pl.x && p.x < pl.x+pl.w &&
        p.y+p.h > pl.y && p.y+p.h < pl.y+pl.h+18 && p.vy >= 0) {
      p.y = pl.y - p.h; p.vy = 0; p.onGround = true;
    }
  }

  p.x = Math.max(0, Math.min(WORLD - p.w, p.x));

  if (p.y > H + 60) {
    lives--;
    document.getElementById('lv').textContent = lives;
    if (lives <= 0) { gameOver = true; }
    else { p.x = spawnX; p.y = spawnY; p.vx = 0; p.vy = 0; }
  }

  for (let o of orbs) {
    if (!o.col) continue;
    if (Math.abs(p.x+p.w/2 - o.x) < 18 && Math.abs(p.y+p.h/2 - o.y) < 18) {
      o.col = false; score += 100;
      document.getElementById('sc').textContent = score;
      spawnParticle(o.x, o.y, '#ffdd55');
    }
  }

  if (orbs.every(o => !o.col)) {
    if (level < 2) {
      level++; document.getElementById('lvl').textContent = 'LEVEL ' + level;
      spawnX = 60; spawnY = 220; init();
    } else { won = true; }
  }

  cam.x += (p.x - W/3 - cam.x) * 0.1;
  cam.x = Math.max(0, Math.min(WORLD - W, cam.x));

  particles = particles.filter(pt => {
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.15; pt.life -= 0.045; return pt.life > 0;
  });
}

const _stars = Array.from({length:70}, () => ({
  x: Math.random()*W, y: Math.random()*H*.8,
  r: Math.random()*1.2+.2, t: Math.random()*Math.PI*2
}));

function drawBG() {
  const grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#07061a'); grd.addColorStop(1,'#0e0a1e');
  ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
  _stars.forEach(s => {
    s.t += 0.015;
    ctx.globalAlpha = 0.3 + 0.3*Math.sin(s.t);
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 0.07;
  for (let i = 0; i < 5; i++) {
    const x = ((i*200 - cam.x*0.08) % W + W) % W;
    ctx.fillStyle = '#3322aa';
    ctx.beginPath(); ctx.arc(x, 80+i*30, 60+i*20, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawPlatform(pl) {
  const grd = ctx.createLinearGradient(0,pl.y,0,pl.y+pl.h+6);
  grd.addColorStop(0,'#2a1e4e'); grd.addColorStop(1,'#160e2e');
  ctx.fillStyle = grd; ctx.strokeStyle = '#4422aa'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(pl.x-cam.x, pl.y, pl.w, pl.h, 3); ctx.fill(); ctx.stroke();
  ctx.strokeStyle='rgba(150,100,255,0.18)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pl.x-cam.x+8,pl.y+2); ctx.lineTo(pl.x-cam.x+pl.w-8,pl.y+2); ctx.stroke();
}

function drawOrb(o) {
  if (!o.col) return;
  const t = Date.now()*0.002;
  const ox = o.x - cam.x;
  ctx.save();
  ctx.shadowColor = '#ffcc44'; ctx.shadowBlur = 14;
  const grd = ctx.createRadialGradient(ox,o.y,0,ox,o.y,o.r);
  grd.addColorStop(0,'#ffe88a'); grd.addColorStop(1,'#cc8800');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(ox, o.y + Math.sin(t+o.x)*2.5, o.r, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPlayer() {
  const t = p.anim;
  ctx.save(); ctx.translate(p.x - cam.x + p.w/2, p.y + p.h/2);
  if (p.dir < 0) ctx.scale(-1,1);
  const grd = ctx.createLinearGradient(-p.w/2,-p.h/2,p.w/2,p.h/2);
  grd.addColorStop(0,'#7755cc'); grd.addColorStop(1,'#3311aa');
  ctx.fillStyle = grd; ctx.shadowColor='#9966ff'; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.roundRect(-9,-13,18,24,4); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#c8aaff';
  const legOff = p.onGround ? Math.sin(t)*5 : 0;
  ctx.fillRect(-7,11,5,8+legOff); ctx.fillRect(2,11,5,8-legOff);
  ctx.fillStyle = '#e8ddff';
  ctx.beginPath(); ctx.ellipse(0,-16,5,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(150,80,255,0.18)';
  ctx.beginPath(); ctx.ellipse(0,-14,9,8,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawParticles() {
  particles.forEach(pt => {
    ctx.globalAlpha = pt.life; ctx.fillStyle = pt.col;
    ctx.beginPath(); ctx.arc(pt.x - cam.x, pt.y, 3, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawGround() {
  ctx.fillStyle='#110d22'; ctx.fillRect(0,290,W,30);
  ctx.strokeStyle='#2a1a55'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,290); ctx.lineTo(W,290); ctx.stroke();
}

function drawOverlay() {
  if (gameOver) {
    ctx.fillStyle='rgba(5,3,14,0.72)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#cc4466'; ctx.font='bold 36px monospace'; ctx.textAlign='center';
    ctx.fillText('GAME OVER', W/2, H/2-20);
    ctx.fillStyle='#888'; ctx.font='14px monospace';
    ctx.fillText('press F5 to try again', W/2, H/2+16);
  }
  if (won) {
    ctx.fillStyle='rgba(5,3,20,0.72)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#bbaaff'; ctx.font='bold 32px monospace'; ctx.textAlign='center';
    ctx.fillText('YOU ESCAPED', W/2, H/2-20);
    ctx.fillStyle='#ffdd55'; ctx.font='14px monospace';
    ctx.fillText('FINAL SCORE: ' + score, W/2, H/2+16);
  }
}

function loop() {
  update(); drawBG(); drawGround();
  platforms.forEach(drawPlatform);
  orbs.forEach(drawOrb);
  drawParticles(); drawPlayer(); drawOverlay();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
